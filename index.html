<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄大港橋</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f4f8fb;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .intro {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-top: 25px;
      line-height: 1.8;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      color: #0077b6;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      background: #023e8a;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>高雄市・大港橋</h1>
  <p>亞洲最長跨港旋轉景觀橋</p>
</header>

<div class="container">

  <div class="gallery">
    <img src="https://khh.travel/content/images/attractions/1147/1024x768_attractions-image-kwkdbodoe0q2p8f1x7gqga.jpg" alt="大港橋白天景色">
    
    <img src="https://khh.travel/content/images/attractions/1147/1024x768_attractions-image-vzv6t3m0hukxj0d9v3n1ha.jpg" alt="大港橋空拍圖">
    
    <img src="https://playing.ltn.com.tw/Upload/article/2020/01/06/200106-7171-1.jpg" alt="大港橋夜景">
  </div>

  <div class="intro">
    <h2>景點簡介</h2>
    <p>
      大港橋位於高雄駁二藝術特區旁，橫跨高雄港第三船渠，
      是全台第一座水平旋轉景觀橋，也是亞洲最長的跨港旋轉橋。
      橋身採純白流線造型設計，以海豚與貝殼作為靈感，
      成為高雄港灣最具代表性的地標之一。
    </p>

    <p>
      大港橋全長約110公尺，可供行人與自行車通行，
      並設有觀景平台，可欣賞高雄港灣、流行音樂中心與城市天際線。
      每日下午固定時間會進行橋體旋轉開合秀，
      吸引許多遊客駐足欣賞。
    </p>

    <p>
      夜晚點燈後的大港橋更加浪漫迷人，
      搭配港灣倒影與周邊文創園區，
      已成為高雄熱門的觀光與拍照打卡景點。
    </p>
  </div>

</div>

<footer>
  資料來源：高雄旅遊網
</footer>

</body>
</html>
